name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-offline:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        # PyYAML is optional at runtime (the harness works without it
        # when no harness/config.yaml is present), but the offline
        # test suite exercises the yaml branch of the config loader,
        # so CI needs it.
        run: pip install 'pyyaml>=6,<7'

      - name: Run harness offline tests
        run: python3 harness/scripts/test_offline.py
