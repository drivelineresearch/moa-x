# MoA-X harness config — copy to harness/config.yaml to activate.
#
# Two top-level sections:
#   providers:  optional user-defined named providers (extends the built-ins)
#   layers:     which providers run at which layer
#
# Built-in named providers (no need to declare):
#   codex   → {harness: codex,  model: gpt-5.4}                # OpenAI via codex CLI
#   gemini  → {harness: gemini, model: gemini-2.5-pro}         # Google via gemini CLI
#   sonnet  → {harness: claude, model: claude-sonnet-4-6}      # Anthropic via claude CLI
#
# Override built-in models via:
#   --codex-model / --gemini-model / --sonnet-model CLI flags, or
#   MOA_CODEX_MODEL / MOA_GEMINI_MODEL / MOA_SONNET_MODEL env vars.
#
# User-named providers (e.g. via the Cursor CLI which routes to many labs):
# providers:
#   cursor-gpt:    {harness: cursor, model: gpt-5.5}
#   cursor-sonnet: {harness: cursor, model: claude-sonnet-4-6}
#   cursor-grok:   {harness: cursor, model: grok-4.20}
#
# Layer assignments: subset of (built-in names ∪ user-named providers).
layers:
  proposers: [codex, gemini, sonnet]
  refiners:  [codex, gemini]
  # Set true to skip the refinement layer entirely.
  skip_refinement: false

# Example: 4-lane proposer mix using one extra Cursor lane:
#
# providers:
#   cursor-grok: {harness: cursor, model: grok-4.20}
# layers:
#   proposers: [codex, gemini, sonnet, cursor-grok]
#   refiners:  [codex, gemini]
#
# Example: one CLI delivering everything (uncomment to use):
#
# providers:
#   c-gpt:    {harness: cursor, model: gpt-5.5}
#   c-sonnet: {harness: cursor, model: claude-sonnet-4-6}
#   c-gemini: {harness: cursor, model: gemini-3.1-pro}
# layers:
#   proposers: [c-gpt, c-sonnet, c-gemini]
#   refiners:  [c-gpt, c-gemini]
#
# CLAUDE.md recommends keeping refiner labs disjoint from the aggregator
# (Anthropic). This is no longer harness-enforced — see the doc for context.
