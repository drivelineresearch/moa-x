# MoA-X harness config — copy to harness/config.yaml to activate.
#
# Two top-level sections:
#   providers:  optional user-defined named providers (extends the built-ins)
#   layers:     which providers run at which layer
#
# Built-in named providers (no need to declare):
#   codex     → {harness: codex,    model: gpt-5.4}                     # OpenAI via codex CLI
#   sonnet    → {harness: claude,   model: claude-sonnet-4-6}           # Anthropic via claude CLI
#   glm       → {harness: opencode, model: opencode-go/glm-5.2}             # GLM via opencode-go gateway
#   kimi      → {harness: opencode, model: opencode-go/kimi-k2.7-code}       # Kimi via opencode-go gateway
#   composer  → {harness: cursor,   model: composer-2.5}                # Cursor Composer via cursor-agent
#
# Override a built-in's model via:
#   --codex-model / --sonnet-model CLI flags, or
#   MOA_<NAME>_MODEL env vars (e.g. MOA_GLM_MODEL, MOA_KIMI_MODEL, MOA_CODEX_MODEL).
#   e.g. run glm through Fireworks instead of Zhipu direct:
#     MOA_GLM_MODEL=fireworks-ai/accounts/fireworks/models/glm-5p2
#
# NOTE: gemini was removed in v0.3.0. To run a Gemini model, route it through
# the cursor harness as a user-named provider (see the migration example below).
#
# Layer assignments: subset of (built-in names ∪ user-named providers).
layers:
  proposers: [codex, glm, sonnet]
  refiners:  [codex, kimi]
  # Set true to skip the refinement layer entirely.
  skip_refinement: false

# User-named providers extend the built-ins. Define them here, or as a
# shell/.env shorthand: MOA_PROVIDER_<NAME>=<harness>:<model> (see .env.example).
# YAML wins over the env shorthand on a name conflict.
#
# Example: 4-lane proposer mix adding one Cursor lane
#
# providers:
#   cursor-grok: {harness: cursor, model: grok-4.3}
# layers:
#   proposers: [codex, glm, sonnet, cursor-grok]
#   refiners:  [codex, kimi]
#
# Example: run GLM + Kimi through Fireworks serverless instead of the defaults
#
# providers:
#   glm-fw:  {harness: opencode, model: fireworks-ai/accounts/fireworks/models/glm-5p2}
#   kimi-fw: {harness: opencode, model: fireworks-ai/accounts/fireworks/models/kimi-k2p7-code}
# layers:
#   proposers: [codex, glm-fw, sonnet]
#   refiners:  [codex, kimi-fw]
#
# Example: everything through the Cursor CLI (one binary, many labs)
#
# providers:
#   c-gpt:      {harness: cursor, model: gpt-5.5}
#   c-composer: {harness: cursor, model: composer-2.5}
#   c-grok:     {harness: cursor, model: grok-4.3}
# layers:
#   proposers: [c-gpt, c-composer, c-grok]
#   refiners:  [c-gpt, c-grok]
#
# Migration: a Gemini model via the cursor harness (gemini built-in was removed)
#
# providers:
#   cursor-gemini: {harness: cursor, model: gemini-3.1-pro}
# layers:
#   proposers: [codex, cursor-gemini, sonnet]
#   refiners:  [codex, kimi]
#
# CLAUDE.md recommends keeping refiner labs disjoint from the aggregator
# (Anthropic). This is no longer harness-enforced — see the doc for context.
