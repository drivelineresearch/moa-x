<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__PAGE_TITLE__</title>
<style>
/* ---------------------------------------------------------------------------
   MoA-X run report — white surface (Driveline design language).
   Pure white canvas, 8px Mine Shaft top bar, goldenrod sole accent,
   ZERO box-shadows, hand-crafted SVG charts. No external requests.
   Font strategy: Gotham/Lato are proprietary and cannot be inlined without a
   license, so this self-contained artifact uses a heavy system stack for the
   "Gotham" headline role (uppercase, bold) and a clean system sans for body.
--------------------------------------------------------------------------- */
:root {
  --gold: #FFA300;
  --burnt: #CF7F00;
  --ink: #262626;
  --black: #000000;
  --white: #FFFFFF;
  --panel: #F4F4F5;
  --secondary: #6B7280;
  --muted: #9CA3AF;
  --track: #E5E7EB;
  --green: #10B981;
  --red: #EF4444;
  --dist: #D1D5DB;
  --font-head: 'Helvetica Neue', 'Arial Narrow', Arial, system-ui, sans-serif;
  --font-body: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  --font-mono: 'SF Mono', 'Menlo', 'Consolas', 'Liberation Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; }
svg, svg * { filter: none; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  background: var(--white);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}
a { color: var(--burnt); text-decoration: none; border-bottom: 1px solid var(--track); }
a:hover { color: var(--gold); border-color: var(--gold); }

.topbar { height: 8px; background: var(--ink); width: 100%; position: sticky; top: 0; z-index: 60; }

.wrap { max-width: 1180px; margin: 0 auto; padding: 0 28px; }

h1, h2, h3, .head { font-family: var(--font-head); text-transform: uppercase; letter-spacing: 0.01em; font-weight: 800; }
h2.section-title { font-size: 1.6rem; margin: 0 0 4px; }
.section-kicker { font-family: var(--font-head); text-transform: uppercase; font-weight: 800; font-size: 0.7rem; letter-spacing: 0.14em; color: var(--gold); }
section.block { padding: 44px 0; border-top: 1px solid var(--track); }
section.block:first-of-type { border-top: none; }

/* ---- Header ---- */
header.report-head { padding: 40px 0 30px; }
.report-head .eyebrow { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 20px; }
.brandmark { font-family: var(--font-head); font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; font-size: 1.1rem; }
.brandmark .x { color: var(--gold); }
.report-head h1 { font-size: 2.9rem; line-height: 1.02; margin: 0 0 14px; max-width: 20ch; }
.meta-row { display: flex; flex-wrap: wrap; gap: 8px 26px; align-items: center; color: var(--secondary); font-size: 0.85rem; margin-bottom: 20px; }
.meta-row b { color: var(--ink); font-weight: 700; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip { display: inline-flex; align-items: center; gap: 7px; padding: 5px 12px; border: 1px solid var(--track); border-radius: 999px; font-size: 0.8rem; background: var(--white); }
.chip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); }
.chip .role { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; }
.badge { display: inline-block; padding: 4px 11px; border-radius: 6px; font-family: var(--font-head); font-weight: 800; text-transform: uppercase; font-size: 0.68rem; letter-spacing: 0.08em; }
.badge.ok { background: var(--gold); color: var(--white); }
.badge.warn { background: var(--red); color: var(--white); }
.badge.neutral { background: var(--panel); color: var(--ink); }

/* ---- Sticky nav ---- */
nav.mininav { position: sticky; top: 8px; z-index: 50; background: rgba(255,255,255,0.94); backdrop-filter: blur(4px); border-bottom: 1px solid var(--track); }
nav.mininav .inner { display: flex; gap: 4px; overflow-x: auto; padding: 10px 0; }
nav.mininav a { border: none; font-family: var(--font-head); text-transform: uppercase; font-weight: 700; font-size: 0.72rem; letter-spacing: 0.06em; color: var(--secondary); padding: 6px 12px; border-radius: 6px; white-space: nowrap; }
nav.mininav a:hover { background: var(--panel); color: var(--ink); }
nav.mininav a.active { color: var(--ink); background: var(--panel); box-shadow: inset 0 -2px 0 var(--gold); }

/* ---- Stat tiles ---- */
.tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); background: var(--white); border: 1px solid var(--track); border-radius: 12px; overflow: hidden; }
.tile { background: var(--white); padding: 18px 20px; border-right: 1px solid var(--track); border-bottom: 1px solid var(--track); }
.tile .k { font-family: var(--font-head); font-weight: 800; text-transform: uppercase; font-size: 0.64rem; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 8px; }
.tile .v { font-family: var(--font-head); font-weight: 800; font-size: 1.9rem; line-height: 1; }
.tile .v small { font-size: 0.9rem; color: var(--secondary); }

/* ---- Hero (Three.js) ---- */
#hero { position: relative; width: 100%; height: 440px; border: 1px solid var(--track); border-radius: 12px; overflow: hidden; background: var(--white); }
#hero canvas { display: block; width: 100%; height: 100%; cursor: grab; }
#hero canvas:active { cursor: grabbing; }
#hero .hint { position: absolute; bottom: 12px; left: 14px; font-size: 0.72rem; color: var(--muted); pointer-events: none; }
#hero-fallback { display: none; }

/* ---- Collapsibles ---- */
.collapse { border: 1px solid var(--track); border-radius: 12px; margin-bottom: 14px; overflow: hidden; }
.collapse > .c-head { display: flex; align-items: center; gap: 12px; padding: 16px 20px; cursor: pointer; user-select: none; background: var(--white); }
.collapse > .c-head:hover { background: var(--panel); }
.collapse > .c-head .c-title { font-family: var(--font-head); font-weight: 800; text-transform: uppercase; font-size: 0.92rem; letter-spacing: 0.02em; flex: 1; }
.collapse > .c-head .caret { color: var(--muted); transition: transform 0.2s ease; font-size: 0.8rem; }
.collapse.open > .c-head .caret { transform: rotate(90deg); }
.collapse > .c-body { max-height: 0; overflow: hidden; transition: max-height 0.32s ease; }
.collapse > .c-body > .pad { padding: 4px 20px 22px; }
.reduced .collapse > .c-body { transition: none; }

.c-head .status-pip { width: 10px; height: 10px; border-radius: 50%; flex: none; }
.pip-ok { background: var(--green); }
.pip-fail { background: var(--red); }
.pip-warn { background: var(--gold); }
.c-head .mini-stats { display: flex; gap: 14px; color: var(--secondary); font-size: 0.76rem; }
.c-head .mini-stats span b { color: var(--ink); }

/* ---- Text + code ---- */
.summary-text { font-size: 1rem; line-height: 1.6; margin: 6px 0 18px; }
.subhead { font-family: var(--font-head); font-weight: 800; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.1em; color: var(--muted); margin: 22px 0 10px; }
code.inline { font-family: var(--font-mono); font-size: 0.85em; background: var(--panel); padding: 1px 6px; border-radius: 4px; }
.codeblock { font-family: var(--font-mono); font-size: 0.82rem; background: var(--panel); border-radius: 10px; padding: 16px 18px; overflow-x: auto; white-space: pre-wrap; word-break: break-word; line-height: 1.5; }

/* ---- Plan steps ---- */
.step { border-left: 3px solid var(--track); padding: 4px 0 4px 18px; margin: 0 0 20px; }
.step .step-n { font-family: var(--font-head); font-weight: 800; color: var(--gold); font-size: 0.8rem; }
.step .step-title { font-weight: 700; margin: 2px 0 6px; }
.step .why { color: var(--secondary); margin-bottom: 10px; }
.ev-chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
.ev { display: inline-flex; align-items: center; gap: 6px; font-size: 0.74rem; padding: 3px 9px; border-radius: 6px; border: 1px solid var(--track); font-family: var(--font-mono); }
.ev.code { background: var(--panel); }
.ev.ext { background: var(--white); }
.ev .tag { text-transform: uppercase; font-family: var(--font-head); font-size: 0.6rem; letter-spacing: 0.06em; color: var(--muted); }
.files { display: flex; flex-wrap: wrap; gap: 6px; margin: 6px 0; }
.file-tok { font-family: var(--font-mono); font-size: 0.74rem; color: var(--secondary); background: var(--panel); padding: 2px 7px; border-radius: 4px; }
.risk { font-size: 0.82rem; color: var(--secondary); padding-left: 16px; position: relative; margin: 3px 0; }
.risk::before { content: "△"; position: absolute; left: 0; color: var(--gold); font-size: 0.7rem; top: 2px; }

/* ---- Tables ---- */
table.dl { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
table.dl th, table.dl td { text-align: left; padding: 9px 12px; border-bottom: 1px solid var(--track); }
table.dl th { font-family: var(--font-head); text-transform: uppercase; font-size: 0.66rem; letter-spacing: 0.08em; color: var(--muted); font-weight: 800; }

/* ---- Verdict matrix ---- */
.matrix { overflow-x: auto; }
.matrix table { border-collapse: separate; border-spacing: 6px; }
.matrix th { font-family: var(--font-head); text-transform: uppercase; font-size: 0.66rem; letter-spacing: 0.06em; color: var(--secondary); padding: 4px 8px; text-align: center; font-weight: 800; }
.matrix th.rowh { text-align: right; color: var(--ink); }
.mcell { min-width: 108px; height: 52px; border-radius: 8px; padding: 7px 9px; cursor: default; display: flex; flex-direction: column; justify-content: center; gap: 2px; }
.mcell .verdict { font-family: var(--font-head); text-transform: uppercase; font-size: 0.6rem; letter-spacing: 0.04em; font-weight: 800; }
.mcell.v-accept_as_is { background: rgba(16,185,129,0.16); color: #0b7a5a; }
.mcell.v-accept_with_changes { background: rgba(255,163,0,0.18); color: #9a6300; }
.mcell.v-reject { background: rgba(239,68,68,0.15); color: #b3271e; }
.mcell.v-none { background: var(--panel); color: var(--muted); }

/* ---- Verification dots ---- */
.verif-row { margin: 14px 0; }
.verif-row .vlabel { display: flex; gap: 10px; align-items: baseline; margin-bottom: 8px; }
.verif-row .vlabel .name { font-family: var(--font-head); font-weight: 800; text-transform: uppercase; font-size: 0.8rem; }
.verif-row .vlabel .counts { font-size: 0.78rem; color: var(--secondary); }
.dots { display: flex; flex-wrap: wrap; gap: 6px; }
.vdot { width: 15px; height: 15px; border-radius: 4px; cursor: pointer; }
.vdot.verified { background: var(--green); }
.vdot.unverified { background: var(--track); }
.vdot.contradicted { background: var(--red); }
.vdetail { display: none; margin-top: 10px; font-size: 0.85rem; background: var(--panel); border-radius: 8px; padding: 12px 14px; }
.vdetail.show { display: block; }
.vdetail .vd-path { font-family: var(--font-mono); font-size: 0.78rem; color: var(--burnt); }

/* ---- Cards / disagreements ---- */
.cardgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }
.dcard { border: 1px solid var(--track); border-left: 3px solid var(--gold); border-radius: 10px; padding: 14px 16px; }
.dcard .who { font-family: var(--font-head); text-transform: uppercase; font-weight: 800; font-size: 0.68rem; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 6px; }
.dcard .pt { font-weight: 700; margin-bottom: 6px; }
.dcard .lbl { font-family: var(--font-head); text-transform: uppercase; font-size: 0.62rem; letter-spacing: 0.06em; color: var(--gold); margin: 8px 0 2px; }
.checklist { list-style: none; padding: 0; margin: 0; }
.checklist li { padding-left: 24px; position: relative; margin: 7px 0; }
.checklist li::before { content: "✓"; position: absolute; left: 0; color: var(--green); font-weight: 800; }
.flaglist { list-style: none; padding: 0; margin: 0; }
.flaglist li { padding-left: 24px; position: relative; margin: 7px 0; }
.flaglist li::before { content: "!"; position: absolute; left: 3px; color: var(--red); font-weight: 800; font-family: var(--font-head); }

/* ---- Pull quote (synthesis) ---- */
.pullquote { position: relative; padding: 6px 0 6px 54px; margin: 6px 0; }
.pullquote::before { content: "\201C"; position: absolute; left: 0; top: -14px; font-family: Georgia, serif; font-size: 5rem; color: var(--gold); line-height: 1; }
.pullquote .q { font-size: 1.05rem; line-height: 1.55; font-style: italic; }
.pullquote .by { font-family: var(--font-head); text-transform: uppercase; font-weight: 800; font-size: 0.72rem; letter-spacing: 0.06em; color: var(--secondary); margin-top: 8px; }

/* ---- Logs ---- */
.log-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
.log-tabs button { font-family: var(--font-head); text-transform: uppercase; font-weight: 700; font-size: 0.68rem; letter-spacing: 0.05em; padding: 6px 14px; border: 1px solid var(--track); background: var(--white); border-radius: 6px; cursor: pointer; color: var(--secondary); }
.log-tabs button.active { background: var(--ink); color: var(--white); border-color: var(--ink); }
.log-filter { width: 100%; padding: 8px 12px; border: 1px solid var(--track); border-radius: 8px; font-family: var(--font-mono); font-size: 0.8rem; margin-bottom: 10px; }
.log-view { font-family: var(--font-mono); font-size: 0.78rem; background: var(--panel); border-radius: 10px; max-height: 460px; overflow: auto; padding: 12px 0; }
.log-line { display: flex; padding: 0 14px; white-space: pre-wrap; word-break: break-word; }
.log-line:hover { background: rgba(255,163,0,0.08); }
.log-line .ln { color: var(--muted); user-select: none; min-width: 46px; text-align: right; padding-right: 14px; flex: none; }
.log-line.hidden { display: none; }
.log-empty { padding: 12px 14px; color: var(--muted); font-family: var(--font-body); }

/* ---- Controls ---- */
.controls { display: flex; gap: 8px; margin-bottom: 16px; }
.btn { font-family: var(--font-head); text-transform: uppercase; font-weight: 700; font-size: 0.68rem; letter-spacing: 0.05em; padding: 7px 14px; border: 1px solid var(--track); background: var(--white); border-radius: 6px; cursor: pointer; color: var(--ink); }
.btn:hover { background: var(--panel); }

/* ---- Scope columns ---- */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.two-col ul { padding-left: 18px; margin: 6px 0; }
.qa { margin: 10px 0; }
.qa .q { font-weight: 700; }
.qa .a { color: var(--secondary); }

/* ---- Final plan render ---- */
.plan-render h1, .plan-render h2, .plan-render h3 { text-transform: none; font-family: var(--font-head); margin: 22px 0 8px; }
.plan-render h1 { font-size: 1.5rem; } .plan-render h2 { font-size: 1.2rem; } .plan-render h3 { font-size: 1rem; }
.plan-render p { margin: 8px 0; } .plan-render ul, .plan-render ol { padding-left: 22px; }
.plan-render li { margin: 4px 0; }
.plan-render pre { font-family: var(--font-mono); font-size: 0.82rem; background: var(--panel); border-radius: 10px; padding: 14px 16px; overflow-x: auto; }
.plan-render code { font-family: var(--font-mono); background: var(--panel); padding: 1px 5px; border-radius: 4px; font-size: 0.85em; }
.plan-render pre code { background: none; padding: 0; }

/* ---- Tooltip ---- */
#tooltip { position: fixed; z-index: 100; pointer-events: none; background: rgba(0,0,0,0.9); color: #fff; font-size: 0.76rem; line-height: 1.4; padding: 8px 11px; border-radius: 8px; max-width: 320px; display: none; }
#tooltip .tt-h { color: var(--gold); font-family: var(--font-head); text-transform: uppercase; font-size: 0.62rem; letter-spacing: 0.06em; margin-bottom: 3px; }

/* ---- Flowchart footer ---- */
.flow svg { width: 100%; height: auto; }
footer.foot { border-top: 1px solid var(--track); padding: 30px 0 60px; color: var(--muted); font-size: 0.8rem; }

.notice { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); border-radius: 10px; padding: 14px 18px; margin-bottom: 18px; color: #b3271e; }
.notice.info { background: var(--panel); border-color: var(--track); color: var(--ink); }
.empty-note { color: var(--muted); font-style: italic; }

@media (max-width: 720px) {
  .report-head h1 { font-size: 2rem; }
  .two-col { grid-template-columns: 1fr; }
  #hero { height: 340px; }
}
@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
}
@media print {
  nav.mininav, #hero .hint, .controls, .log-filter, .log-tabs { display: none !important; }
  .collapse > .c-body { max-height: none !important; }
  #hero { display: none; } #hero-fallback { display: block !important; }
  section.block { padding: 20px 0; }
}
</style>
</head>
<body>
<div class="topbar"></div>

<script type="application/json" id="moa-data">__MOA_DATA_JSON__</script>

<nav class="mininav"><div class="wrap"><div class="inner" id="mininav-inner"></div></div></nav>

<div class="wrap" id="app"></div>

<div id="tooltip"></div>

<script>/*__THREE_JS_LIB__*/</script>
<script>
"use strict";
(function () {
  var DATA = JSON.parse(document.getElementById("moa-data").textContent);
  var REDUCED = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (REDUCED) document.body.classList.add("reduced");

  var C = { gold: "#FFA300", green: "#10B981", red: "#EF4444", ink: "#262626", track: "#E5E7EB", muted: "#9CA3AF" };

  // ---- tiny DOM helper ----
  function el(tag, attrs, kids) {
    var n = document.createElement(tag);
    if (attrs) for (var k in attrs) {
      if (k === "class") n.className = attrs[k];
      else if (k === "html") n.innerHTML = attrs[k];
      else if (k === "text") n.textContent = attrs[k];
      else if (k.slice(0, 2) === "on" && typeof attrs[k] === "function") n.addEventListener(k.slice(2), attrs[k]);
      else if (attrs[k] != null) n.setAttribute(k, attrs[k]);
    }
    if (kids != null) (Array.isArray(kids) ? kids : [kids]).forEach(function (c) {
      if (c == null) return;
      n.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
    });
    return n;
  }
  function esc(s) { var d = document.createElement("div"); d.textContent = s == null ? "" : String(s); return d.innerHTML; }
  function fmtDur(s) { if (s == null) return "—"; if (s < 60) return s.toFixed(1) + "s"; var m = Math.floor(s / 60); return m + "m " + Math.round(s - m * 60) + "s"; }
  function statusPip(r) { return r.success ? "pip-ok" : (r.transient_empty ? "pip-warn" : "pip-fail"); }

  var app = document.getElementById("app");
  var sections = [];
  function addSection(id, navLabel, node) { sections.push({ id: id, label: navLabel }); app.appendChild(node); }

  // ---------------------------------------------------------------- Header
  (function () {
    var head = el("header", { class: "report-head" });
    head.appendChild(el("div", { class: "eyebrow" }, [
      el("div", { class: "brandmark", html: 'MoA<span class="x">-X</span> &nbsp;RUN REPORT' }),
      el("div", { class: "badge " + (DATA.partial ? "warn" : "neutral"), text: DATA.partial ? "Partial (Layer 1 only)" : "Full session" })
    ]));
    head.appendChild(el("h1", { text: DATA.title || DATA.session_id }));
    var l2badge;
    if (DATA.layer2_mode === "broadcast") l2badge = el("span", { class: "badge ok", text: "broadcast" });
    else if (DATA.layer2_mode === "degraded_non_broadcast") l2badge = el("span", { class: "badge warn", text: "degraded" });
    else l2badge = el("span", { class: "badge neutral", text: DATA.layer2_mode || "n/a" });
    var l2span = el("span", {}, ["Layer 2 "]); l2span.appendChild(l2badge);
    head.appendChild(el("div", { class: "meta-row" }, [
      el("span", { html: "Session <b>" + esc(DATA.session_id) + "</b>" }),
      el("span", { html: "Generated <b>" + esc(DATA.generated_at) + "</b>" }),
      el("span", { html: "Wall-clock <b>" + fmtDur(DATA.duration_seconds) + "</b>" }),
      l2span
    ]));
    var chips = el("div", { class: "chips" });
    (DATA.config && DATA.config.proposers || []).forEach(function (p) { chips.appendChild(providerChip(p, "proposer")); });
    (DATA.config && DATA.config.refiners || []).forEach(function (p) { chips.appendChild(providerChip(p, "refiner")); });
    if (DATA.config && DATA.config.proposer_instances) DATA.config.proposer_instances.forEach(function (n) { chips.appendChild(providerChip({ name: n, harness: "claude" }, "proposer")); });
    if (DATA.config && DATA.config.refiner_instances) DATA.config.refiner_instances.forEach(function (n) { chips.appendChild(providerChip({ name: n, harness: "claude" }, "refiner")); });
    head.appendChild(chips);
    app.appendChild(head);
  })();
  function providerChip(p, role) {
    return el("span", { class: "chip" }, [
      el("span", { class: "dot" }),
      el("span", { html: "<b>" + esc(p.name) + "</b>" }),
      el("span", { class: "role", text: p.model || p.harness || role })
    ]);
  }

  // ---------------------------------------------------------------- Overview tiles
  (function () {
    var l1 = DATA.layer1 || [], l2 = DATA.layer2 || [];
    var agentSecs = l1.concat(l2).reduce(function (a, r) { return a + (r.duration_seconds || 0); }, 0);
    var sec = el("section", { class: "block", id: "overview" });
    sec.appendChild(el("div", { class: "section-kicker", text: "Overview" }));
    sec.appendChild(el("h2", { class: "section-title", text: "The run at a glance" }));
    var tiles = el("div", { class: "tiles" });
    function tile(k, v, sub) { return el("div", { class: "tile" }, [el("div", { class: "k", text: k }), el("div", { class: "v", html: v + (sub ? ' <small>' + sub + '</small>' : '') })]); }
    tiles.appendChild(tile("Proposers", l1.filter(function (r) { return r.success; }).length + "/" + l1.length));
    tiles.appendChild(tile("Refiners", l2.filter(function (r) { return r.success; }).length + "/" + l2.length));
    tiles.appendChild(tile("Agent time", fmtDur(agentSecs)));
    tiles.appendChild(tile("Wall-clock", fmtDur(DATA.duration_seconds)));
    var speedup = DATA.duration_seconds ? (agentSecs / DATA.duration_seconds).toFixed(1) + "×" : "—";
    tiles.appendChild(tile("Parallel gain", speedup));
    sec.appendChild(tiles);
    sec.appendChild(buildHero());
    addSection("overview", "Overview", sec);
  })();

  // ---------------------------------------------------------------- Timeline (SVG Gantt)

      var color = s.r.success ? C.gold : (s.r.transient_empty ? C.gold : C.red);
      var bar = svgEl("rect", { x: bx, y: y + 7, width: bw, height: rowH - 16, rx: 8, fill: color, opacity: s.r.success ? 1 : 0.55 });
      bar.setAttribute("data-tip", (s.r.success ? "OK" : ("FAIL — " + (s.r.error || ""))) + " · " + fmtDur(s.dur));
      bar.setAttribute("data-tiph", s.r.agent_id + " " + s.r.role);
      svg.appendChild(bar);
      svg.appendChild(svgText(bx + bw + 6, y + rowH / 2 + 4, fmtDur(s.dur), { fill: C.secondary || C.muted, "font-size": 10 }));
    });
    var note = el("p", { class: "empty-note", style: "margin-top:14px", html: "Bars use recorded per-agent start offsets when present; older manifests fall back to layer-derived offsets (Layer 1 from t0, Layer 2 after the slowest proposer)." });
    var box = el("div"); box.appendChild(svg); box.appendChild(note); return box;
  }

  // ---------------------------------------------------------------- Three.js hero
  function buildHero() {
    var host = el("div", { id: "hero" });
    host.appendChild(el("div", { class: "hint", text: REDUCED ? "Motion reduced — static view" : "Drag to orbit · click a node to jump to its section" }));
    var fallback = el("div", { id: "hero-fallback", html: staticFlowSVG() });
    host.appendChild(fallback);
    // Reduced motion: skip WebGL entirely and show the static SVG pipeline.
    if (REDUCED) fallback.style.display = "block";
    else setTimeout(function () { initThree(host); }, 0);
    return host;
  }
  function initThree(host) {
    if (typeof THREE === "undefined") { host.querySelector("#hero-fallback").style.display = "block"; return; }
    var W = host.clientWidth, H = host.clientHeight;
    var scene = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(45, W / H, 0.1, 100);
    camera.position.set(0, 1.5, 15);
    var renderer;
    try { renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); }
    catch (e) { host.querySelector("#hero-fallback").style.display = "block"; return; }
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(W, H);
    renderer.setClearColor(0xffffff, 0);
    host.insertBefore(renderer.domElement, host.firstChild);
    scene.add(new THREE.AmbientLight(0xffffff, 0.85));
    var key = new THREE.DirectionalLight(0xffffff, 0.6); key.position.set(4, 8, 10); scene.add(key);

    var group = new THREE.Group(); scene.add(group);
    var COL = { gold: 0xFFA300, green: 0x10B981, red: 0xEF4444, ink: 0x262626 };
    var nodes = [];
    function addNode(x, y, label, dur, status, target) {
      var maxDur = 500;
      var rad = 0.34 + 0.5 * Math.min(1, Math.sqrt((dur || 30) / maxDur));
      var color = status === "fail" ? COL.red : (status === "anchor" ? COL.gold : COL.green);
      var geo = new THREE.SphereGeometry(rad, 28, 28);
      var mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.45, metalness: 0.1 });
      var m = new THREE.Mesh(geo, mat); m.position.set(x, y, 0);
      m.userData = { target: target, base: y };
      group.add(m); nodes.push(m);
      group.add(makeLabel(label, x, y - rad - 0.42));
      return m;
    }
    function makeLabel(text, x, y) {
      var cv = document.createElement("canvas"); var s = 256; cv.width = s; cv.height = 64;
      var ctx = cv.getContext("2d"); ctx.fillStyle = "#262626";
      ctx.font = "bold 30px Arial, sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(text.toUpperCase(), s / 2, 32);
      var tex = new THREE.CanvasTexture(cv); tex.needsUpdate = true;
      var spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
      spr.position.set(x, y, 0); spr.scale.set(2.4, 0.6, 1); return spr;
    }
    function edge(a, b) {
      var g = new THREE.BufferGeometry().setFromPoints([a.position, b.position]);
      var line = new THREE.Line(g, new THREE.LineBasicMaterial({ color: COL.gold, transparent: true, opacity: 0.35 }));
      group.add(line);
      return { a: a, b: b };
    }

    var l1 = (DATA.layer1 || []), l2 = (DATA.layer2 || []);
    var scout = addNode(-6.5, 0, "scout", 20, "anchor", "scout");
    function spread(n, i) { return n <= 1 ? 0 : (i - (n - 1) / 2) * 2.4; }
    var pNodes = l1.map(function (r, i) { return addNode(-2.2, spread(l1.length, i), r.agent_id, r.duration_seconds, r.success ? "ok" : "fail", "proposers"); });
    var rNodes = l2.map(function (r, i) { return addNode(2.2, spread(l2.length, i), r.agent_id, r.duration_seconds, r.success ? "ok" : "fail", "refiners"); });
    var agg = null;
    if (!DATA.partial) agg = addNode(6.5, 0, "opus", 60, "anchor", "plan");

    var edges = [];
    pNodes.forEach(function (p) { edges.push(edge(scout, p)); });
    // broadcast: every proposer → every refiner
    pNodes.forEach(function (p) { rNodes.forEach(function (rf) { edges.push(edge(p, rf)); }); });
    if (agg) rNodes.forEach(function (rf) { edges.push(edge(rf, agg)); });
    if (agg && !rNodes.length) pNodes.forEach(function (p) { edges.push(edge(p, agg)); });

    // particles
    var particles = [];
    if (!REDUCED) edges.forEach(function (e, i) {
      var pg = new THREE.SphereGeometry(0.09, 10, 10);
      var pm = new THREE.MeshBasicMaterial({ color: COL.gold });
      var mesh = new THREE.Mesh(pg, pm); group.add(mesh);
      particles.push({ mesh: mesh, e: e, t: (i * 0.13) % 1 });
    });

    // custom drag-orbit
    var rotY = -0.15, rotX = 0.12, dragging = false, px = 0, py = 0, autoV = 0.0022;
    var cv = renderer.domElement;
    cv.addEventListener("mousedown", function (e) { dragging = true; px = e.clientX; py = e.clientY; });
    window.addEventListener("mouseup", function () { dragging = false; });
    window.addEventListener("mousemove", function (e) {
      if (!dragging) return;
      rotY += (e.clientX - px) * 0.008; rotX += (e.clientY - py) * 0.006;
      rotX = Math.max(-0.8, Math.min(0.8, rotX)); px = e.clientX; py = e.clientY;
    });
    cv.addEventListener("touchstart", function (e) { if (e.touches[0]) { dragging = true; px = e.touches[0].clientX; py = e.touches[0].clientY; } }, { passive: true });
    cv.addEventListener("touchmove", function (e) { if (dragging && e.touches[0]) { rotY += (e.touches[0].clientX - px) * 0.008; rotX += (e.touches[0].clientY - py) * 0.006; rotX = Math.max(-0.8, Math.min(0.8, rotX)); px = e.touches[0].clientX; py = e.touches[0].clientY; } }, { passive: true });
    cv.addEventListener("touchend", function () { dragging = false; });

    // click → raycast
    var ray = new THREE.Raycaster(), mouse = new THREE.Vector2(), downPos = null;
    cv.addEventListener("mousedown", function (e) { downPos = [e.clientX, e.clientY]; });
    cv.addEventListener("click", function (e) {
      if (downPos && (Math.abs(e.clientX - downPos[0]) + Math.abs(e.clientY - downPos[1])) > 6) return;
      var rect = cv.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      ray.setFromCamera(mouse, camera);
      var hit = ray.intersectObjects(nodes);
      if (hit.length && hit[0].object.userData.target) {
        var t = document.getElementById(hit[0].object.userData.target);
        if (t) t.scrollIntoView({ behavior: REDUCED ? "auto" : "smooth", block: "start" });
      }
    });

    function resize() { W = host.clientWidth; H = host.clientHeight; camera.aspect = W / H; camera.updateProjectionMatrix(); renderer.setSize(W, H); }
    window.addEventListener("resize", resize);

    var clock = 0;
    function frame() {
      if (!REDUCED && !dragging) rotY += autoV;
      group.rotation.y = rotY; group.rotation.x = rotX;
      if (!REDUCED) {
        clock += 0.006;
        nodes.forEach(function (n, i) { n.position.y = n.userData.base + Math.sin(clock * 1.4 + i) * 0.05; });
        particles.forEach(function (p) {
          p.t += 0.01; if (p.t > 1) p.t -= 1;
          p.mesh.position.lerpVectors(p.e.a.position, p.e.b.position, p.t);
        });
      }
      renderer.render(scene, camera);
      if (!REDUCED) requestAnimationFrame(frame);
    }
    frame();
    if (REDUCED) renderer.render(scene, camera);
  }

  // ---------------------------------------------------------------- static SVG flow
  function staticFlowSVG() {
    var g = C.gold, ink = C.ink, tk = C.track;
    function box(x, label, sub) {
      return '<rect x="' + x + '" y="60" width="150" height="70" rx="12" fill="#fff" stroke="' + tk + '"/>' +
        '<text x="' + (x + 75) + '" y="90" text-anchor="middle" font-family="Arial" font-weight="800" font-size="13" fill="' + ink + '">' + label + '</text>' +
        '<text x="' + (x + 75) + '" y="110" text-anchor="middle" font-family="Arial" font-size="10" fill="' + C.muted + '">' + sub + '</text>';
    }
    function arrow(x1, x2) { return '<line x1="' + x1 + '" y1="95" x2="' + (x2 - 8) + '" y2="95" stroke="' + g + '" stroke-width="2"/>' + '<polygon points="' + (x2 - 8) + ',90 ' + x2 + ',95 ' + (x2 - 8) + ',100" fill="' + g + '"/>'; }
    return '<svg viewBox="0 0 900 190" width="100%" role="img" aria-label="MoA-X four-layer pipeline">' +
      box(10, "SCOUT", "Layer 0 · brief") + arrow(160, 210) +
      box(210, "PROPOSERS", "Layer 1 · parallel") + arrow(360, 410) +
      box(410, "REFINERS", "Layer 2 · broadcast") + arrow(560, 610) +
      box(610, "AGGREGATOR", "Layer 3 · Opus") +
      '<text x="450" y="165" text-anchor="middle" font-family="Arial" font-size="11" fill="' + C.muted + '">Each refiner reviews every proposer — cross-lab verification before synthesis.</text>' +
      '</svg>';
  }

  // ---------------------------------------------------------------- SVG helpers
  function svgEl(tag, attrs) { var n = document.createElementNS("http://www.w3.org/2000/svg", tag); for (var k in attrs) n.setAttribute(k, attrs[k]); return n; }
  function svgText(x, y, text, attrs) { var t = svgEl("text", Object.assign({ x: x, y: y, "font-family": "Arial, sans-serif" }, attrs || {})); t.textContent = text; return t; }

  // ---------------------------------------------------------------- Nav + scrollspy
  (function () {
    var inner = document.getElementById("mininav-inner");
    sections.forEach(function (s) { inner.appendChild(el("a", { href: "#" + s.id, text: s.label })); });
    var links = Array.prototype.slice.call(inner.querySelectorAll("a"));
    function spy() {
      var y = window.scrollY + 120, cur = sections[0].id;
      sections.forEach(function (s) { var e = document.getElementById(s.id); if (e && e.offsetTop <= y) cur = s.id; });
      links.forEach(function (a) { a.className = a.getAttribute("href") === "#" + cur ? "active" : ""; });
    }
    window.addEventListener("scroll", spy); spy();
  })();

  // ---------------------------------------------------------------- Tooltip
  (function () {
    var tip = document.getElementById("tooltip");
    document.addEventListener("mouseover", function (e) {
      var t = e.target.closest ? e.target.closest("[data-tip]") : null;
      if (!t || !t.getAttribute("data-tip")) return;
      tip.innerHTML = (t.getAttribute("data-tiph") ? '<div class="tt-h">' + esc(t.getAttribute("data-tiph")) + "</div>" : "") + esc(t.getAttribute("data-tip"));
      tip.style.display = "block";
    });
    document.addEventListener("mousemove", function (e) {
      if (tip.style.display !== "block") return;
      var x = e.clientX + 14, y = e.clientY + 16;
      if (x + tip.offsetWidth > window.innerWidth - 10) x = e.clientX - tip.offsetWidth - 14;
      if (y + tip.offsetHeight > window.innerHeight - 10) y = e.clientY - tip.offsetHeight - 16;
      tip.style.left = x + "px"; tip.style.top = y + "px";
    });
    document.addEventListener("mouseout", function (e) {
      var t = e.target.closest ? e.target.closest("[data-tip]") : null;
      if (t) tip.style.display = "none";
    });
  })();
})();
</script>
</body>
